name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      LLVM_VERSION: 22.1.8
      LLVM_SOURCE: ${{ github.workspace }}/llvm-project
      LLVM_BUILD: ${{ github.workspace }}/llvm-build

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtest-dev

      - name: Download LLVM source
        run: |
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/llvm-project-${LLVM_VERSION}.src.tar.xz"
          echo "Downloading $URL"
          curl -fsSL -o llvm.tar.xz "$URL"
          mkdir -p $LLVM_SOURCE
          tar xf llvm.tar.xz -C $LLVM_SOURCE --strip-components=1
          rm llvm.tar.xz

      - name: Cache LLVM build
        id: cache-llvm-build
        uses: actions/cache@v4
        with:
          path: ${{ env.LLVM_BUILD }}
          key: llvm-build-${{ env.LLVM_VERSION }}-v1

      - name: Build LLVM
        if: steps.cache-llvm-build.outputs.cache-hit != 'true'
        run: |
          mkdir -p $LLVM_BUILD && cd $LLVM_BUILD
          cmake $LLVM_SOURCE/llvm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS=mlir \
            -DLLVM_TARGETS_TO_BUILD=Native \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DMLIR_INCLUDE_TESTS=OFF \
            -DMLIR_ENABLE_BINDINGS_PYTHON=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF
          ninja

      - name: Configure project
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DLLVM_PROJECT_BUILD_DIR=$LLVM_BUILD \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLK_BUILD_TOOLS=OFF \
            -DLLK_BUILD_E2E_TESTS=OFF

      - name: Build
        run: cd build && ninja

      - name: Run tests
        run: cd build && ctest --output-on-failure
