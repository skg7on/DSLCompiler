name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    permissions:
      security-events: write
      actions: read
      contents: read

    env:
      LLVM_COMMIT: f9bda52e57a7ca7d2aa3d32f8383fb9e3c3e1e2b
      LLVM_SOURCE: ${{ github.workspace }}/llvm-project
      LLVM_INSTALL: ${{ github.workspace }}/llvm-install

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtest-dev

      - name: Cache LLVM build
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: ${{ env.LLVM_INSTALL }}
          key: llvm-${{ env.LLVM_COMMIT }}-x86-64-codeql-v1

      - name: Checkout LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          path: llvm-project
          ref: ${{ env.LLVM_COMMIT }}
          fetch-depth: 1

      - name: Build and install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          mkdir -p llvm-build && cd llvm-build
          cmake $LLVM_SOURCE/llvm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$LLVM_INSTALL \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_ENABLE_PROJECTS="mlir" \
            -DLLVM_BUILD_LLVM_DYLIB=ON \
            -DLLVM_LINK_LLVM_DYLIB=ON \
            -DMLIR_ENABLE_BINDINGS_PYTHON=OFF \
            -DLLVM_INSTALL_GTEST=OFF
          ninja install
          rm -rf llvm-build

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Configure and build
        run: |
          mkdir -p build && cd build
          cmake .. -G Ninja \
            -DMLIR_DIR=$LLVM_INSTALL/lib/cmake/mlir \
            -DLLVM_DIR=$LLVM_INSTALL/lib/cmake/llvm \
            -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
